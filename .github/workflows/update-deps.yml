name: Update Dependencies

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Check for outdated dependencies
        id: check
        run: |
          pip list --outdated --format=json > outdated.json
          if [ -s outdated.json ] && [ "$(cat outdated.json)" != "[]" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update pyproject.toml versions
        if: steps.check.outputs.has_updates == 'true'
        run: |
          python - <<'PYEOF'
          import json, re, pathlib

          pyproject = pathlib.Path("pyproject.toml")
          text = pyproject.read_text()

          outdated = json.loads(pathlib.Path("outdated.json").read_text())
          updates = {p["name"]: p["latest_version"] for p in outdated}

          for pkg, ver in updates.items():
              # Match lines like "pkg>=1.2.3,<2.0.0" or "pkg==1.2.3"
              # Only update the lower bound, keep upper bound constraints
              pattern = rf'("{re.escape(pkg)}>=)[^"]*(")'
              new_text = re.sub(pattern, rf'\g<1>{ver}\2', text)
              if new_text != text:
                  print(f"Updated {pkg} lower bound to {ver}")
                  text = new_text

          pyproject.write_text(text)
          PYEOF

      - name: Sync requirements.txt
        if: steps.check.outputs.has_updates == 'true'
        run: |
          # Regenerate requirements.txt from pyproject.toml
          python - <<'PYEOF'
          import re, pathlib

          text = pathlib.Path("pyproject.toml").read_text()

          # Extract dependencies from [project] dependencies array
          deps_match = re.search(r'dependencies\s*=\s*\[(.*?)\]', text, re.DOTALL)
          if deps_match:
              deps = re.findall(r'"([^"]+)"', deps_match.group(1))
              pathlib.Path("requirements.txt").write_text("\n".join(deps) + "\n")
              print(f"Wrote {len(deps)} dependencies to requirements.txt")
          PYEOF

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: 'chore: update dependencies'
          body: |
            Automated dependency update generated by GitHub Actions.

            Updated packages:
            ```
            $(python -c "import json; data=json.load(open('outdated.json')); print('\n'.join(f'- {p[\"name\"]} {p[\"version\"]} -> {p[\"latest_version\"]}' for p in data))")
            ```
          branch: chore/update-dependencies
          delete-branch: true
